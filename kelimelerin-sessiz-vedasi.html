            color: var(--primary);
            margin: 0 0 5px 0;
            text-transform: uppercase;
            border-bottom: 2px double var(--accent);

            text-align: center;
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 20px;
            font-style: italic;

        <button onclick="nextCard()">İLERİ →</button>

</div>

    let currentIndex = 0;
    let correct = 0;
    let wrong = 0;

    function updateCard() {
        const item = data[currentIndex];
        document.getElementById('wordTitle').innerText = item.word;
        document.getElementById('wordOrigin').innerText = item.origin;
        document.getElementById('currentMeaning').innerText = item.current;
        document.getElementById('currentQuote').innerText = item.quote;

        const hasOld = item.old && item.old.trim() !== '';

        // Etiket: eski anlam varsa "Günümüz Anlamı", yoksa "Anlamı"
        document.getElementById('currentLabel').innerText = hasOld ? 'Günümüz Anlamı' : 'Anlamı';

        // Eski anlam bölümünü göster/gizle
        const oldSection = document.getElementById('oldSection');
        if (hasOld) {
            oldSection.style.display = 'block';
            document.getElementById('oldMeaning').innerText = item.old;
            document.getElementById('oldQuote').innerText = item.oldQuote || '';
        } else {
            oldSection.style.display = 'none';
        }
    }

    function nextCard() { currentIndex = (currentIndex + 1) % data.length; updateCard(); }
    function prevCard() { currentIndex = (currentIndex - 1 + data.length) % data.length; updateCard(); }

    function searchWord() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        const foundIndex = data.findIndex(i => i.word.toLowerCase().includes(term));
        if (foundIndex !== -1) { currentIndex = foundIndex; updateCard(); }
    }

    function downloadCard() {
        const area = document.getElementById('captureArea');
        html2canvas(area, {backgroundColor: null}).then(canvas => {
            const link = document.createElement('a');
            link.download = `${data[currentIndex].word}_kart.png`;
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function startQuiz() {
        document.getElementById('card-view').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQuizQuestion();
    }

    function showCards() {
        document.getElementById('card-view').style.display = 'block';
        document.getElementById('quiz-section').style.display = 'none';
    }

    function loadQuizQuestion() {
        const item = data[Math.floor(Math.random() * data.length)];
        document.getElementById('quizWord').innerText = item.word;
        
        let options = [item.current];
        while(options.length < 3) {
            let rand = data[Math.floor(Math.random() * data.length)].current;
            if(!options.includes(rand)) options.push(rand);
        }
        options.sort(() => Math.random() - 0.5);

        const optDiv = document.getElementById('quizOptions');
        optDiv.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => {
                if(opt === item.current) {
                    correct++;
                    document.getElementById('correctSound').play();
                } else {
                    wrong++;
                    document.getElementById('wrongSound').play();
                    alert("Yanlış! Doğru cevap: " + item.current);
                }
                document.getElementById('correctScore').innerText = correct;
                document.getElementById('wrongScore').innerText = wrong;
                loadQuizQuestion();
            };
            optDiv.appendChild(btn);
        });
    }

    updateCard();
